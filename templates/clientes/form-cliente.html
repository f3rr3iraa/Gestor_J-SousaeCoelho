<div class="form-container">
  <h2 class="title-color">Adicionar Cliente</h2>

  <form id="clienteForm" autocomplete="off">

    <!-- ================= DADOS PRINCIPAIS ================= -->
    <fieldset>
      <legend>Dados do Cliente</legend>
      <div class="row g-3">

        <div class="coolinput col-4">
          <label for="fld_a1x9k" class="text">Nome / Descrição:</label>
          <input type="search" name="x_desc1_k7" id="fld_a1x9k"
            class="input" placeholder="Nome completo ou empresa"
            autocomplete="off" required />
        </div>

        <div class="coolinput col-4">
          <label for="fld_b2y7m" class="text">Descrição 2:</label>
          <input type="search" name="x_desc2_m3" id="fld_b2y7m"
            class="input" placeholder="Nome alternativo / departamento..."
            autocomplete="off" />
        </div>

        <div class="coolinput col-4">
          <label for="fld_c3z5p" class="text">Contribuinte (NIF/NIPC):</label>
          <input type="search" name="x_nif_p9" id="fld_c3z5p"
            class="input" placeholder="Ex: 123456789"
            maxlength="20" autocomplete="off" />
        </div>

      </div>
    </fieldset>

    <br />

    <!-- ================= MORADA ================= -->
    <fieldset>
      <legend>Morada</legend>
      <div class="row g-3">

        <div class="coolinput col-4">
          <label for="fld_d4w3q" class="text">Morada:</label>
          <input type="search" name="x_mor1_q2" id="fld_d4w3q"
            class="input" placeholder="Rua, Avenida, número..."
            autocomplete="new-password" />
        </div>

        <div class="coolinput col-4">
          <label for="fld_e5v2r" class="text">Localidade:</label>
          <input type="search" name="x_mor2_r5" id="fld_e5v2r"
            class="input" placeholder="Localidade / Complemento..."
            autocomplete="new-password" />
        </div>

        <div class="coolinput col-2">
          <label for="fld_f6u1j" class="text">Código Postal:</label>
          <input type="search" name="x_cp_j8" id="fld_f6u1j"
            class="input" placeholder="0000-000"
            maxlength="10" autocomplete="off" />
        </div>

        <div class="coolinput col-2">
          <label for="fld_g7t8n" class="text">País:</label>
          <input type="search" name="x_pais_n1" id="fld_g7t8n"
            class="input" placeholder="Ex: PORTUGAL"
            maxlength="50" autocomplete="off" />
        </div>

      </div>
    </fieldset>

    <br />

    <!-- ================= CONTACTOS ================= -->
    <fieldset>
      <legend>Contactos</legend>
      <div class="row g-3">

        <div class="coolinput col-3">
          <label for="fld_h8s6w" class="text">Telefone:</label>
          <input type="search" name="x_tel1_w6" id="fld_h8s6w"
            class="input" placeholder="Ex: 255 861 372"
            maxlength="20" autocomplete="off" />
        </div>

        <div class="coolinput col-3">
          <label for="fld_i9r4v" class="text">Telefone 2:</label>
          <input type="search" name="x_tel2_v4" id="fld_i9r4v"
            class="input" placeholder="Ex: 919 789 143"
            maxlength="20" autocomplete="off" />
        </div>

      </div>
    </fieldset>

    <br />

    <!-- ================= AÇÕES ================= -->
    <div class="form-actions justify-content-end">
      <button type="button" id="btnLimparCliente" class="btn-form" style="background-color: #6c757d;">
        <i class="bi bi-eraser me-2"></i> Limpar
      </button>
      <button type="submit" class="btn-form">
        <i class="bi bi-save me-2"></i> Guardar Cliente
      </button>
    </div>

  </form>
</div>
