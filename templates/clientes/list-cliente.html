<h2 class="title-color">Lista de Clientes</h2>

<!-- ================= FILTROS ================= -->
<div id="filtrosContainer" class="container-fluid mb-3 px-0">
  <div class="row g-2 align-items-end col-12">

    <!-- NOME -->
    <div class="col-3">
      <div class="coolinput w-100">
        <label for="filtroDescricao" class="text">Nome</label>
        <input
          type="text"
          id="filtroDescricao"
          class="input w-100"
          placeholder="Pesquisar por nome..."
        />
      </div>
    </div>

    <!-- CONTRIBUINTE -->
    <div class="col-2">
      <div class="coolinput w-100">
        <label for="filtroContribuinte" class="text">Contribuinte</label>
        <input
          type="text"
          id="filtroContribuinte"
          class="input w-100"
          placeholder="NIF / NIPC..."
        />
      </div>
    </div>

    <!-- LOCALIDADE -->
    <div class="col-2">
      <div class="coolinput w-100">
        <label for="filtroMorada2" class="text">Localidade</label>
        <input
          type="text"
          id="filtroMorada2"
          class="input w-100"
          placeholder="Localidade..."
        />
      </div>
    </div>

    <!-- LIMPAR -->
    <div class="col-2">
      <button id="btnLimparFiltros" class="btn-form">
        Limpar Filtros
      </button>
    </div>

  </div>
</div>

<!-- ================= TABELA ================= -->
<div class="table-responsive mt-3">
  <table class="table table-striped table-bordered align-middle text-center">
    <thead class="table-color">
      <tr>
        <th class="align-middle" style="width:20%">Nome</th>
        <th class="align-middle" style="width:12%">Descrição 2</th>
        <th class="align-middle" style="width:10%">Contribuinte</th>
        <th class="align-middle" style="width:14%">Morada</th>
        <th class="align-middle" style="width:10%">Localidade</th>
        <th class="align-middle" style="width:8%">Cód. Postal</th>
        <th class="align-middle" style="width:6%">País</th>
        <th class="align-middle" style="width:8%">Telefone</th>
        <th class="align-middle" style="width:8%">Telefone 2</th>
        <th class="align-middle" style="width:5%">Ações</th>
      </tr>
    </thead>
    <tbody id="clientesTableBody">
      <tr>
        <td colspan="10">A carregar dados...</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- ================= PAGINAÇÃO ================= -->
<div class="d-flex justify-content-between align-items-center px-4 py-3 flex-wrap">
  <div class="mb-2 mb-md-0">
    <label for="itemsPerPage" class="me-2 fw-bold">Itens por página:</label>
    <select id="itemsPerPage" class="form-select d-inline-block w-auto">
      <option value="10" selected>10</option>
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="100">100</option>
    </select>
  </div>

  <nav aria-label="Navegação de páginas" class="mb-2 mb-md-0">
    <ul class="pagination mb-0" id="paginationControls">
      <li class="page-item">
        <button class="page-link" id="prevPage"><i class="bi bi-caret-left-fill"></i></button>
      </li>
      <li class="page-item disabled">
        <span class="page-link" id="pageIndicator">1 / 1</span>
      </li>
      <li class="page-item">
        <button class="page-link" id="nextPage"><i class="bi bi-caret-right-fill"></i></button>
      </li>
    </ul>
  </nav>
</div>

<!-- ================= MODAL ELIMINAR ================= -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Confirmar eliminação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        Tem a certeza que quer eliminar o cliente <strong id="deleteClienteNome"></strong>?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<!-- ================= OFFCANVAS EDITAR ================= -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="editOffcanvas" aria-labelledby="editOffcanvasLabel" style="width: 560px;">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="editOffcanvasLabel">Editar Cliente</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
  </div>
  <div class="offcanvas-body">
    <form id="clienteEditForm">
      <input type="hidden" id="editClienteId" />

      <div class="coolinput">
        <label for="editDescricao" class="text">Nome / Descrição</label>
        <input type="text" id="editDescricao" class="input" required />
      </div>

      <div class="coolinput">
        <label for="editDescricao2" class="text">Descrição 2</label>
        <input type="text" id="editDescricao2" class="input" />
      </div>

      <div class="coolinput">
        <label for="editContribuinte" class="text">Contribuinte (NIF/NIPC)</label>
        <input type="text" id="editContribuinte" class="input" maxlength="20"/>
      </div>

      <div class="coolinput">
        <label for="editMorada" class="text">Morada</label>
        <input type="text" id="editMorada" class="input" />
      </div>

      <div class="coolinput">
        <label for="editMorada2" class="text">Morada 2 / Localidade</label>
        <input type="text" id="editMorada2" class="input" />
      </div>

      <div class="coolinput">
        <label for="editCodpostal" class="text">Código Postal</label>
        <input type="text" id="editCodpostal" class="input" maxlength="10" />
      </div>

      <div class="coolinput">
        <label for="editPais" class="text">País</label>
        <input type="text" id="editPais" class="input" maxlength="50" />
      </div>

      <div class="coolinput">
        <label for="editTelefone" class="text">Telefone</label>
        <input type="text" id="editTelefone" class="input" maxlength="20" />
      </div>

      <div class="coolinput">
        <label for="editTelefone2" class="text">Telefone 2</label>
        <input type="text" id="editTelefone2" class="input" maxlength="20" />
      </div>

      <button type="submit" class="btn-form mt-3">
        <i class="bi bi-save me-2"></i>Guardar alterações
      </button>
    </form>
  </div>
</div>
