<div class="home-container">
  <h2>Adicionar Novos Produtos</h2>

  <form id="itemForm">
    <!-- Secção 1: Informações Gerais -->
    <fieldset>
      <legend class="mt-3">Informações Gerais</legend>

        <div class="coolinput col-5">
          <label for="marca" class="text">Marca:</label>
          <input type="text" name="marca" id="marca" placeholder="Escreve aqui..." class="input" required>
        </div>
        
        <div class="coolinput col-5">
          <label for="nome" class="text">Nome:</label>
          <input type="text" name="nome" id="nome" placeholder="Escreve aqui..." class="input" required>
        </div>
        
        <div class="coolinput col-5">
          <label for="tipo" class="text">Tipo:</label>
          <select name="tipo" id="tipo" class="input" required>
            <option value="Peça">Peça</option>
            <option value="Chapa">Chapa</option>
          </select>
        </div>

    </fieldset>

    <br>

    <!-- Secção 2: Dimensões -->
    <fieldset>
      <legend>Dimensões</legend>

        <div class="coolinput col-3">
          <label for="comprimento" class="text">Comprimento (cm):</label>
          <input type="number" name="comprimento" id="comprimento" step="0.01" class="input" placeholder="Ex: 120.5">
        </div>
        
        <div class="coolinput col-3">
          <label for="largura" class="text">Largura (cm):</label>
          <input type="number" name="largura" id="largura" step="0.01" class="input" placeholder="Ex: 80.3">
        </div>

    </fieldset>

    <br>

    <!-- Secção 3: Outros Detalhes -->
    <fieldset>
      <legend>Outros Detalhes</legend>

      <div class="coolinput col-3">
        <label for="foto" class="text">Foto:</label>
        <input type="file" name="foto" id="foto" class="input" accept="image/*">
      </div>

      <div class="coolinput col-5">
        <label for="observacoes" class="text">Observações:</label>
        <textarea name="observacoes" id="observacoes" class="input" rows="4" placeholder="Escreve observações..."></textarea>
      </div>
    </fieldset>

    <br>

    <button type="submit" class="btn-form">Enviar</button>
  </form>
</div>

<style>
/* ====== ESTILO BASE DO CONTAINER ====== */
.home-container {
  display: flex;
  flex-direction: column;
  max-height: 100vh;
}


legend {
  font-weight: bold;
}


/* ====== ESTILO COOLINPUT ====== */
/* From Uiverse.io by kamehame-ha */
.coolinput {
  display: flex;
  flex-direction: column;
  position: relative;
  margin-top: 15px;
}

.coolinput label.text {
  font-size: 0.8rem;
  color: #315b99;
  font-weight: 700;
  position: relative;
  top: 0.5rem;
  margin: 0 0 0 7px;
  padding: 0 3px;
  background: #f8f9fa;
  width: fit-content;
}

.coolinput .input {
  padding: 10px;
  font-size: 0.85rem;
  border: 2px #315b99 solid;
  border-radius: 5px;
  background: #f8f9fa;
  outline: none;
  resize: vertical;
}

.coolinput .input:focus {
  border-color: #315b99;
}

/* ====== BOTÃO ====== */
.btn-form {
  display: block;
  margin: 20px auto 0 auto;
  padding: 10px 25px;
  border: none;
  border-radius: 6px;
  background-color: #22333B;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn-form:hover {
  background-color: #315b99;
}
</style>
