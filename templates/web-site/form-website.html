<div class="form-container">
  <h2 class="title-color">Adicionar ao Catálogo</h2>

  <form
    id="itemForm"
    method="POST"
    autocomplete="off"
    enctype="multipart/form-data"
  >
    <!-- ================= IMAGE ================= -->
    <fieldset>
      <legend class="mt-3">Imagem</legend>

      <div class="row">
        <div class="coolinput col-4">
          <label for="image" class="text">Imagem:</label>
          <input
            type="file"
            name="image"
            id="image"
            class="input"
            accept="image/*"
            required
          />
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= BRAND ================= -->
    <fieldset>
  <legend>Marca</legend>

  <div class="row">
    <div class="coolinput col-4">
      <label for="brand" class="text">Marca:</label>
      <select name="brand" id="brand" class="input" required>
        <option value="" disabled selected>Seleciona a marca...</option>
      </select>
    </div>

    <div class="coolinput col-4 d-none" id="newBrandWrapper">
      <label for="new_brand" class="text">Nova marca:</label>
      <input
        type="text"
        name="new_brand"
        id="new_brand"
        class="input"
        placeholder="Escrever as primeiras letras com maiúscula"
      />
      <button type="button" id="addNewBrand" class="btn-form mt-2">Adicionar marca</button>
    </div>
  </div>
</fieldset>

    <br />

    <!-- ================= TITLES ================= -->
    <fieldset>
      <legend>Título</legend>

      <div class="row">
        <div class="coolinput col-4">
          <label for="title_pt" class="text">Título (PT):</label>
          <input
            type="text"
            name="title_pt"
            id="title_pt"
            class="input"
            placeholder="Título em português"
            required
          />
        </div>

        <div class="coolinput col-4 d-none" id="titleEnWrapper">
          <label for="title_en" class="text">Título (EN):</label>
          <input
            type="text"
            name="title_en"
            id="title_en"
            class="input"
            placeholder="Título em inglês"
          />
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= TEXTS (ONLY MARBLES) ================= -->
    <fieldset id="textsWrapper" class="d-none">
      <legend>Tipo de Pedra</legend>

      <div class="row">
        <div class="coolinput col-4">
          <label for="text_pt" class="text">Tipo (PT):</label>
          <select name="text_pt" id="text_pt" class="input">
            <option value="" disabled selected>Seleciona...</option>
            <option value="Mármore">Mármore</option>
            <option value="Granito">Granito</option>
          </select>
        </div>

        <div class="coolinput col-4">
          <label for="text_en" class="text">Tipo (EN):</label>
          <input
            type="text"
            name="text_en"
            id="text_en"
            class="input"
            readonly
          />
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= ACTIONS ================= -->
    <div class="form-actions">
      <button type="submit" class="btn-form">Adicionar ao Catálogo</button>
    </div>
  </form>
</div>
