<div class="form-container">
  <h2 class="title-color">Adicionar ao Catálogo</h2>

  <form
    id="itemForm"
    method="POST"
    autocomplete="off"
    enctype="multipart/form-data"
  >
    <!-- ================= IMAGE ================= -->
    <fieldset>
      <legend class="mt-3">Imagem</legend>
      <div class="row">
        <div class="coolinput col-4">
          <label for="image" class="text">Imagem:</label>
          <input
            type="file"
            name="image"
            id="image"
            class="input"
            accept="image/*"
          />
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= BRAND ================= -->
    <fieldset>
      <legend>Marca</legend>
      <div class="row">
        <!-- MARCA COM AUTOCOMPLETE (igual ao formulário de orçamento) -->
        <div class="col-4">
          <div class="coolinput autocomplete-wrapper">
            <label for="brand" class="text">Marca:</label>
            <div class="input-with-clear">
              <input
                type="text"
                id="brand"
                name="brand"
                class="input autocomplete-input"
                placeholder="Seleciona a marca..."
                autocomplete="off"
                required
              />
              <button type="button" class="input-clear-btn d-none" id="clearBrand">
                <i class="bi bi-x"></i>
              </button>
            </div>
            <input type="hidden" id="brandKey" />
            <div id="brandDropdown" class="autocomplete-dropdown"></div>
          </div>
        </div>

        <!-- NOVA MARCA (aparece quando seleciona "+ Adicionar Nova Marca") -->
        <div class="coolinput col-4 d-none" id="newBrandWrapper">
          <label for="new_brand" class="text">Nova marca:</label>
          <input
            type="text"
            name="new_brand"
            id="new_brand"
            class="input"
            placeholder="Escrever as primeiras letras com maiúscula"
          />
          <button type="button" id="addNewBrand" class="btn-form mt-2" style="font-size: 14px; padding: 8px 12px;">
            <i class="bi bi-plus-square me-2"></i>Adicionar Nova Marca
          </button>
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= TITLES ================= -->
    <fieldset>
      <legend>Título</legend>
      <div class="row">
        <div class="coolinput col-4">
          <label for="title_pt" class="text">Título (PT):</label>
          <input
            type="text"
            name="title_pt"
            id="title_pt"
            class="input"
            placeholder="Título em português"
            required
          />
        </div>

        <div class="coolinput col-4 d-none" id="titleEnWrapper">
          <label for="title_en" class="text">Título (EN):</label>
          <input
            type="text"
            name="title_en"
            id="title_en"
            class="input"
            placeholder="Título em inglês"
          />
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= TEXTS (ONLY MARBLES) ================= -->
    <fieldset id="textsWrapper" class="d-none">
      <legend>Tipo de Pedra</legend>
      <div class="row">
        <div class="coolinput col-4">
          <label for="text_pt" class="text">Tipo (PT):</label>
          <select name="text_pt" id="text_pt" class="input">
            <option value="" disabled selected>Seleciona...</option>
            <option value="Mármore">Mármore</option>
            <option value="Granito">Granito</option>
          </select>
        </div>

        <div class="coolinput col-4">
          <label for="text_en" class="text">Tipo (EN):</label>
          <input
            type="text"
            name="text_en"
            id="text_en"
            class="input"
            readonly
          />
        </div>
      </div>
    </fieldset>

    <br />

    <!-- ================= ESPESSURAS + TIPO + PREÇO ================= -->
    <fieldset>
      <legend>Espessuras, Acabamento e Preços</legend>
      <div class="row mb-3">
        <div class="col-12">
          <button type="button" id="addCombinationBtn" class="btn-form" style="font-size: 14px; padding: 8px 12px;">
            <i class="bi bi-plus-square me-2"></i>Adicionar Espessura / Tipo
          </button>
        </div>
      </div>
      <div id="combinationsContainer"></div>
    </fieldset>

    <br />

    <!-- ================= ACTIONS ================= -->
    <div class="form-actions">
      <button type="submit" class="btn-form"><i class="bi bi-save me-2"></i>Adicionar ao Catálogo</button>
    </div>
  </form>
</div>
