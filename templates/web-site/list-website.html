
<h2 class="title-color">Lista do Catálogo</h2>

<!-- ================= FILTROS ================= -->
<div id="filtrosContainer" class="container-fluid mb-3 px-0">
  <div class="row g-2 align-items-end col-12">

    <!-- BRAND -->
    <div class="col-3">
      <div class="coolinput w-100">
        <label for="filtroBrand" class="text">Marca</label>
        <select id="filtroBrand" class="input w-100">
        </select>
      </div>
    </div>

    <!-- TITLE PT -->
    <div class="col-4">
      <div class="coolinput w-100">
        <label for="filtroTitlePt" class="text">Título (PT)</label>
        <input
          type="text"
          id="filtroTitlePt"
          class="input w-100"
          placeholder="Pesquisar por título..."
        >
      </div>
    </div>

    <!-- TEXT PT (ONLY MARBLES) -->
    <div class="col-3 d-none" id="filtroTextWrapper">
      <div class="coolinput w-100">
        <label for="filtroTextPt" class="text">Tipo de Pedra</label>
        <select id="filtroTextPt" class="input w-100">
          <option value="">Todos</option>
          <option value="Mármore">Mármore</option>
          <option value="Granito">Granito</option>
        </select>
      </div>
    </div>

    <!-- LIMPAR -->
    <div class="col-2">
      <button id="btnLimparFiltros" class="btn-form w-100">
        Limpar Filtros
      </button>
    </div>

  </div>
</div>

<!-- ================= TABELA ================= -->
<div class="table-responsive mt-3">
  <table class="table table-striped table-bordered align-middle text-center">
    <thead class="table-color">
        <tr>
            <th class="col-2 align-middle">Imagem</th>
            <th class="col-2 align-middle">Marca</th>
            <th class="col-2 align-middle">Título (PT)</th>
            <th class="col-2 align-middle">Título (EN)</th>
            <th class="col-1 align-middle">Tipo (PT)</th>
            <th class="col-1 align-middle">Tipo (EN)</th>
            <th class="col-1 align-middle">Ações</th>
        </tr>
    </thead>
    <tbody id="websiteItemsBody">
      <tr>
        <td colspan="7">A carregar dados...</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- ================= PAGINAÇÃO ================= -->

<div class="d-flex justify-content-between align-items-center px-4 py-3 flex-wrap">
  <!-- Filtro de quantidade -->
  <div class="mb-2 mb-md-0">
    <label for="itemsPerPage" class="me-2 fw-bold">Itens por página:</label>
      <select id="itemsPerPage" class="form-select d-inline-block w-auto">
    <option value="10" selected>10</option>
    <option value="25">25</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>

  </div>

  <!-- Paginação -->
  <nav aria-label="Navegação de páginas" class="mb-2 mb-md-0">
    <ul class="pagination mb-0" id="paginationControls">
      <li class="page-item"><button class="page-link" id="prevPage"><i class="bi bi-caret-left-fill"></i></button>
      </li>
      <li class="page-item disabled"><span class="page-link" id="pageIndicator">1 / 1</span></li>
      <li class="page-item"><button class="page-link" id="nextPage"><i class="bi bi-caret-right-fill"></i></button>
      </li>
    </ul>
  </nav>
</div>



<!-- Modal Eliminar -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Confirmar eliminação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        Tem a certeza que quer eliminar este item?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<!-- Offcanvas Editar -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="editOffcanvas" aria-labelledby="editOffcanvasLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="editOffcanvasLabel">Editar Catálogo</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
  </div>
  <div class="offcanvas-body">
    <form id="websiteEditForm">
      <input type="hidden" id="websiteEditId">
      <input type="hidden" id="websiteEditFotoAtual">

      <div class="coolinput">
        <label for="websiteEditMarca" class="text">Marca</label>
        <select class="input form-select" id="websiteEditMarca" required>
        </select>
      </div>

      <div class="coolinput">
        <label for="websiteEditTitlePt" class="text">Título (PT)</label>
        <input type="text" class="input form-control" id="websiteEditTitlePt" required>
      </div>

      <div class="coolinput" id="wrapperTitleEn">
        <label for="websiteEditTitleEn" class="text">Título (EN)</label>
        <input type="text" class="input form-control" id="websiteEditTitleEn">
      </div>

      <!-- Agora Texto PT é SELECT -->
      <div class="coolinput" id="wrapperTextPt">
        <label for="websiteEditTextPt" class="text">Texto (PT)</label>
        <select class="input form-select" id="websiteEditTextPt">
          <option value="Mármore">Mármore</option>
          <option value="Granito">Granito</option>
        </select>
      </div>

      <div class="coolinput" id="wrapperTextEn">
        <label for="websiteEditTextEn" class="text">Texto (EN)</label>
        <input type="text" class="input form-control" id="websiteEditTextEn" readonly>
      </div>

      <div class="coolinput">
        <label for="websiteEditFoto" class="text">Foto</label>
        <input type="file" name="websiteEditFoto" id="websiteEditFoto" class="input" accept="image/*">
        <div class="mt-3" id="fotoPreviewContainer">
          <img id="websiteFotoPreview" src="" alt="" style="max-width:350px;height:180px;object-fit:cover;border-radius:6px;box-shadow:0 0 4px rgba(0,0,0,0.2);">
        </div>
      </div>

      <button type="submit" class="btn-form mt-3">Salvar alterações</button>
    </form>
  </div>
</div>
