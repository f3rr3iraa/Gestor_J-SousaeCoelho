<h2 class="title-color">Folha de Horas</h2>

<!-- ================= PAINEL DE GERAÇÃO ================= -->
<div class="container-fluid mb-4 px-0">


  <fieldset>
    <legend>Gerar Folhas de Horas</legend>
    <div class="row align-items-end">

      <!-- Período -->
      <div class="row align-items-end">
      <div class="col-2">
        <div class="coolinput autocomplete-wrapper">
          <label class="text">Mês início:</label>
          <div class="input-with-clear">
            <input type="text" id="selectMesInicio" class="input autocomplete-input"
              placeholder="Seleciona..." autocomplete="off" readonly />
            <button type="button" class="input-clear-btn d-none" id="clearMesInicio">
              <i class="bi bi-x"></i>
            </button>
          </div>
          <div id="mesInicioDropdown" class="autocomplete-dropdown"></div>
        </div>
      </div>

      <div class="col-2">
        <div class="coolinput autocomplete-wrapper">
          <label class="text">Mês fim:</label>
          <div class="input-with-clear">
            <input type="text" id="selectMesFim" class="input autocomplete-input"
              placeholder="Seleciona..." autocomplete="off" readonly />
            <button type="button" class="input-clear-btn d-none" id="clearMesFim">
              <i class="bi bi-x"></i>
            </button>
          </div>
          <div id="mesFimDropdown" class="autocomplete-dropdown"></div>
        </div>
      </div>

      <div class="col-2">
        <div class="coolinput autocomplete-wrapper">
          <label class="text">Ano:</label>
          <div class="input-with-clear">
            <input type="text" id="selectAno" class="input autocomplete-input"
              placeholder="Seleciona..." autocomplete="off" readonly />
            <button type="button" class="input-clear-btn d-none" id="clearAno">
              <i class="bi bi-x"></i>
            </button>
          </div>
          <div id="anoDropdown" class="autocomplete-dropdown"></div>
        </div>
      </div>

      </div>

      <!-- Funcionários -->
      <div class="row align-items-end">
      <div class="col-3">
        <div class="coolinput autocomplete-wrapper">
          <label class="text">Funcionários a imprimir:</label>
          <div class="input-with-clear">
            <input type="text" id="selectFuncionarios" class="input autocomplete-input"
              placeholder="Seleciona..." autocomplete="off" readonly />
          </div>
          <div id="funcionariosDropdown" class="autocomplete-dropdown fh-autocomplete-multi"></div>
        </div>
        </div>
        <div class="col-12 d-flex gap-3">
          <button type="button" id="btnGerarFolhas" class="btn-form">
            <i class="bi bi-printer me-2"></i>Gerar e Imprimir
          </button>
          <button type="button" id="btnGerarPDF" class="btn-form" style="background-color: #198754;">
            <i class="bi bi-download me-2"></i>Exportar PDF
          </button>
        </div>
      </div>

      <!-- Botões -->

    </div>
  </fieldset>

  <!-- SECÇÃO: Adicionar Funcionário -->
  <fieldset class="mt-5">
    <legend>Adicionar Funcionário</legend>
    <div class="row g-3 align-items-end">
      <div class="coolinput col-4">
        <label for="novoFuncionarioNome" class="text">Nome:</label>
        <input type="text" id="novoFuncionarioNome" class="input" placeholder="Nome completo..." autocomplete="off" />
      </div>
      <div class="coolinput col-3">
        <label for="novoFuncionarioCargo" class="text">Cargo / Função:</label>
        <input type="text" id="novoFuncionarioCargo" class="input" placeholder="Ex: Operador, Administrativo..." autocomplete="off" />
      </div>
      <div class="col-auto">
        <button type="button" id="btnAdicionarFuncionario" class="btn-form">
          <i class="bi bi-person-plus me-2"></i>Adicionar Funcionário
        </button>
      </div>
    </div>

    <!-- Lista de funcionários -->
    <div class="mt-3">
      <table class="table table-sm table-striped table-bordered align-middle text-center" id="tabelaFuncionarios">
        <thead class="table-color">
          <tr>
            <th>Nome</th>
            <th>Cargo</th>
            <th style="width:120px">Ações</th>
          </tr>
        </thead>
        <tbody id="funcionariosBody">
          <tr><td colspan="4" class="text-muted">A carregar...</td></tr>
        </tbody>
      </table>
    </div>
  </fieldset>

  <!-- SECÇÃO: Gerar Folhas -->
  
</div>

<!-- ================= ÁREA DE IMPRESSÃO ================= -->
<div id="areaImpressao" style="position:fixed; top:0; left:0; width:100%; opacity:0; z-index:-9999; pointer-events:none;"></div>
<!-- Offcanvas Editar Funcionário -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="editFuncionarioOffcanvas" aria-labelledby="editFuncionarioOffcanvasLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="editFuncionarioOffcanvasLabel">Editar Funcionário</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
  </div>
  <div class="offcanvas-body">
    <input type="hidden" id="editFuncId">
    <div class="coolinput mb-3">
      <label for="editFuncNome" class="text">Nome:</label>
      <input type="text" id="editFuncNome" class="input" placeholder="Nome completo..." autocomplete="off">
    </div>
    <div class="coolinput mb-4">
      <label for="editFuncCargo" class="text">Cargo / Função:</label>
      <input type="text" id="editFuncCargo" class="input" placeholder="Ex: Operador, Administrativo..." autocomplete="off">
    </div>
    <button type="button" class="btn-form" id="btnSalvarEdicaoFuncionario">
      <i class="bi bi-save me-2"></i>Guardar alterações
    </button>
  </div>
</div>
