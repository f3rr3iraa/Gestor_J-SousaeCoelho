<h2>Nossas Reservas</h2>

<!-- 🔍 Filtros -->
<div id="filtrosContainer" class="container-fluid mb-3 px-0">
  <div class="row g-2 align-items-center col-12">
    
    <!-- Referência -->
    <div class="col-2">
      <div class="coolinput w-100">
        <label for="filtroid" class="text">Referência</label>
        <input type="text" id="filtroid" class="input w-100" placeholder="Pesquisar por referência...">
      </div>
    </div>

    <!-- Marca -->
    <div class="col-2">
      <div class="coolinput w-100">
        <label for="filtroMarca" class="text">Marca</label>
        <select id="filtroMarca" class="input w-100">
          <option value="">Todas</option>
        </select>
      </div>
    </div>

    <!-- Nome -->
    <div class="col-3">
      <div class="coolinput w-100">
        <label for="filtroNome" class="text">Nome</label>
        <input type="text" id="filtroNome" class="input w-100" placeholder="Pesquisar por nome...">
      </div>
    </div>

    <!-- Tipo -->
    <div class="col-2">
      <div class="coolinput w-100">
        <label for="filtroTipo" class="text">Tipo</label>
        <select id="filtroTipo" class="input w-100">
          <option value="">Todos</option>
          <option value="Peça">Peça</option>
          <option value="Chapa">Chapa</option>
        </select>
      </div>
    </div>

    <!-- Botão -->
    <div class="col-2 d-flex align-items-end">
        <button id="btnLimparFiltros" class="btn-form">Limpar Filtros</button>
    </div>
  </div>
</div>



<div class="table-responsive mt-3">
  <table class="table table-striped table-bordered text-center align-middle">
    <thead class="table-color">
      <tr>
        <th class="col-1 align-middle">Referência</th>
        <th class="col-2 align-middle">Marca/Nome</th>
        <th class="col-1 align-middle">Comprimento</th>
        <th class="col-1 align-middle">Largura</th>
        <th class="col-1 align-middle">Lote</th>
        <th class="col-1 align-middle">Tipo</th>
        <th class="col-2 align-middle">Observações</th>
        <th class="col-1 align-middle">Foto</th>
        <th class="col-1 align-middle">Data</th>
        <th class="col-1 align-middle">Ações</th>
      </tr>
    </thead>
    <tbody id="itemsBody" class="align-middle">
      <tr><td colspan="9">A carregar dados...</td></tr>
    </tbody>
  </table>
</div>


<!-- Modal Eliminar -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Confirmar eliminação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        Tem a certeza que quer eliminar este item?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
      </div>
    </div>
  </div>
</div>


<!-- Modal Reativar -->
<div class="modal fade" id="reactivateModal" tabindex="-1" aria-labelledby="reactivateModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="reactivateModalLabel">Confirmar reativação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        Tem a certeza que quer reativar este item?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" id="confirmReactivateBtn">Reativar</button>
      </div>
    </div>
  </div>
</div>
