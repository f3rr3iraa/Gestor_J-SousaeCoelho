<div class="home-container">

      <table class="table table-striped table-bordered text-center align-middle">
        <thead class="table-color sticky-header">
          <tr>
            <th class="col-1 align-middle">Referência</th>
            <th class="col-3 align-middle">Marca/Nome</th>
            <th class="col-1 align-middle">Comprimento</th>
            <th class="col-1 align-middle">Largura</th>

            <th class="col-2 align-middle">Observações</th>
            <th class="col-1 align-middle">Foto</th>
            <th class="col-2 align-middle">Data do Pedido</th>
          </tr>
        </thead>
        <tbody id="pedidosBody">
          <tr>
            <td colspan="8">A carregar dados...</td>
          </tr>
        </tbody>
      </table>
      <div class="pagination">
        <button id="prevPedidos" disabled>◀ Anterior</button>
        <button id="nextPedidos" disabled>Seguinte ▶</button>
      </div>

          <tr>
            <td colspan="8">A carregar dados...</td>
          </tr>
        </tbody>
      </table>
      <div class="pagination">
        <button id="prevProdutos" disabled>◀ Anterior</button>
