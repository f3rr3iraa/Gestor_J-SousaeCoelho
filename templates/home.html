<div class="home-container">
  <h2>Página</h2>

  <!-- 🟦 Lista de Pedidos -->
  <section class="pedidos-section mt-3">
    <h4 class="sticky-title">Lista de Pedidos</h4>
    <div class="table-container pedidos-container">
      <table class="table table-striped table-bordered text-center align-middle">
        <thead class="table-color sticky-header">
          <tr>
            <th>Referência</th>
            <th>Nome/Marca</th>
            <th>Comprimento</th>
            <th>Largura</th>
            <th>Tipo</th>
            <th>Observações</th>
            <th>Foto</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="pedidosBody">
          <tr><td colspan="8">A carregar dados...</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <button id="prevPedidos" disabled>◀ Anterior</button>
        <button id="nextPedidos" disabled>Seguinte ▶</button>
      </div>
    </div>
  </section>

  <!-- 🟩 Lista de Produtos -->
  <section class="produtos-section mt-3">
    <h4 class="sticky-title">Lista de Produtos</h4>
    <div class="table-container">
      <table class="table table-striped table-bordered text-center align-middle">
        <thead class="table-color sticky-header">
          <tr>
            <th>Referência</th>
            <th>Nome/Marca</th>
            <th>Comprimento</th>
            <th>Largura</th>
            <th>Tipo</th>
            <th>Observações</th>
            <th>Foto</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="produtosBody">
          <tr><td colspan="8">A carregar dados...</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <button id="prevProdutos" disabled>◀ Anterior</button>
        <button id="nextProdutos" disabled>Seguinte ▶</button>
      </div>
    </div>
  </section>
</div>
