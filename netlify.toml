
[build]
  command = "echo 'No build required'"
  publish = "."
  functions = "netlify/functions"

[dev]
  command = ""
  port = 9000
  targetPort = 9000
  publish = "."
  autoLaunch = false
  framework = "#static"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200