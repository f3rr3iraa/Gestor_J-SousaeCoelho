# netlify.toml

[build]
  publish = "public"  # Ajusta para a tua pasta de output, se não for "public"
  functions = "netlify/functions"

[build.environment]
  # Omitir estas variáveis do scanner de secrets
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_USER_HASH,ADMIN_PASS_HASH,SUPABASE_KEY,SUPABASE_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
